services:
  # Backend API service
  - type: web
    name: leadgen-la-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

  # Frontend web service — Express serves the built React app
  - type: web
    name: leadgen-la-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: leadgen-la-backend
          property: origin
      - key: NODE_ENV
        value: production
